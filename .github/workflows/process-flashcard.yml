name: Generate Flashcard File
on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  create-markdown:
    if: contains(github.event.issue.labels.*.name, 'flashcard')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Problems Directory
        run: mkdir -p problems

      - name: Parse Markdown and Build JSON
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            const title = context.payload.issue.title;
            const body = context.payload.issue.body;
            
            // 1. Extract ID and Title from the issue title format: "[ID] Problem Name"
            const titleMatch = title.match(/\[(\d+)\]\s*(.*)/);
            const id = titleMatch ? titleMatch[1].trim() : Date.now().toString();
            const problemTitle = titleMatch ? titleMatch[2].trim() : title.trim();
            
            // 2. Extract Difficulty and Tags using Regex
            const diffMatch = body.match(/\*\*Difficulty:\*\*\s*(.*)/);
            const tagsMatch = body.match(/\*\*Tags:\*\*\s*(.*)/);
            
            // 3. Extract Intuition and Code Blocks
            const intuitionMatch = body.match(/### Core Intuition\s+([\s\S]*?)\s+### Optimized Solution/);
            const codeMatch = body.match(/```[a-zA-Z]*\s+([\s\S]*?)```/);
            
            // Build the data object
            const data = {
              id: id,
              title: problemTitle,
              difficulty: diffMatch ? diffMatch[1].trim() : 'Unknown',
              tags: tagsMatch ? tagsMatch[1].split(',').map(t=>t.trim()).filter(Boolean) : [],
              intuition: intuitionMatch ? intuitionMatch[1].trim() : 'No intuition provided.',
              code: codeMatch ? codeMatch[1].trim() : 'No code provided.',
              dateAdded: new Date().toISOString().split('T')[0]
            };
            
            // Sanitize filename and save
            const filename = `problems/${id}-${problemTitle.toLowerCase().replace(/[^a-z0-9]+/g, '-')}.json`;
            fs.writeFileSync(filename, JSON.stringify(data, null, 2));
            console.log(`Successfully parsed markdown and saved to ${filename}`);

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add problems/*.json
          git commit -m "Auto-generated flashcard for problem ${{ github.event.issue.title }}"
          git push

      - name: Close the Issue
        run: gh issue close ${{ github.event.issue.number }} --comment "Flashcard successfully compiled from Markdown and added to your private database!"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
